; Steam Controller -> Switch Pro Controller adapter.
;
;   pio test -e test        rig 1: host unit tests against ../tools/fixtures
;   pio run  -e teensy41     rig 3: firmware
;
; The linux (native) and pico rigs are no longer actively supported; their
; sources and env blocks live under archived/adapter/.

[platformio]
default_envs = teensy41

; Rig 1: host-side unit tests. Runs the test/ suites against lib/core/ on the
; build machine. test_build_src stays off (default), so project src/ (the
; teensy firmware) is NOT compiled here -- only lib/core/ + test/. FIXTURES_DIR
; is relative to adapter/ (pio test's CWD). This replaces the old `native` env.
[env:test]
platform = native
build_flags =
    -std=gnu++17
    -Wall -Wextra
    -O2
    -D FIXTURES_DIR=\"../tools/fixtures\"
test_framework = unity

; Rig 3: Teensyduino supplies startup, clocks, UART, and USBHost_t36 only.
; Device USB is upstream TinyUSB, with all descriptors and callbacks owned by
; src/teensy/. The built-in Teensyduino device stack is compiled out.
[env:teensy41]
platform = teensy
board = teensy41
framework = arduino
build_unflags = -DUSB_SERIAL
build_flags =
    -std=gnu++17
    -Wall
    -DUSB_DISABLED
    -DLOG_UART  ; tee crashlog records live to Serial1 (pin 1 TX, 115200); SD still works
    -include teensy_usb_disabled_compat.h
build_src_filter = +<teensy/>
extra_scripts =
    pre:build_teensy_tinyusb.py
    pre:vendor_usbhost_t36.py
lib_deps =
    https://github.com/hathach/tinyusb.git#0.20.0
lib_ignore = TinyUSB
upload_protocol = teensy-cli

; Diagnostic firmware: identical to teensy41 but never drives the grip motors
; (-DNO_RUMBLE). Use it to tell a real IMU bug from the gyro/accel physically
; picking up an over-strong rumble. pio run -e teensy41_norumble -t upload
[env:teensy41_norumble]
extends = env:teensy41
build_flags =
    ${env:teensy41.build_flags}
    -DNO_RUMBLE
